<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" role="img" aria-label="Assessments and Inventory">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="60" rx="8" fill="url(#bg)"/>
  <rect x="0" y="56" width="1200" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Clipboard/assessment icon -->
  <g transform="translate(30, 30)">
    <rect x="-9" y="-10" width="18" height="22" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <rect x="-4" y="-14" width="8" height="6" rx="1" fill="#f97316" opacity="0.6"/>
    <path d="M-4,-1 L-1,2 L5,-4" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <line x1="-4" y1="7" x2="4" y2="7" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>
  <text x="58" y="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="2">ASSESSMENTS</text>
  <text x="58" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">ACT compliance, brain inventory, and adoption candidates</text>
  <circle cx="1170" cy="30" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="1155" cy="30" r="3" fill="#f97316" opacity="0.3"/>
  <circle cx="1143" cy="30" r="2" fill="#ef4444" opacity="0.2"/>
