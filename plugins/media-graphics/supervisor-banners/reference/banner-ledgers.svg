<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" role="img" aria-label="Ledgers and Changelogs">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="60" rx="8" fill="url(#bg)"/>
  <rect x="0" y="56" width="1200" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Ledger/list icon -->
  <g transform="translate(30, 30)">
    <rect x="-10" y="-12" width="20" height="24" rx="2" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <line x1="-5" y1="-6" x2="5" y2="-6" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-5" y1="6" x2="5" y2="6" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <text x="58" y="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#a78bfa" letter-spacing="2">LEDGERS</text>
  <text x="58" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Changelogs, curation log, and audit trails</text>
  <circle cx="1170" cy="30" r="4" fill="#818cf8" opacity="0.4"/>
  <circle cx="1155" cy="30" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1143" cy="30" r="2" fill="#c084fc" opacity="0.2"/>
</svg>
