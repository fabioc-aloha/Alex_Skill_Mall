  <text x="58" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Architecture Decision Records</text>
  <circle cx="1170" cy="30" r="4" fill="#10b981" opacity="0.4"/>
