<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" role="img" aria-label="Architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="60" rx="8" fill="url(#bg)"/>
  <rect x="0" y="56" width="1200" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Blueprint/architecture icon -->
  <g transform="translate(30, 30)">
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <circle cx="-5" cy="-5" r="2.5" fill="#10b981" opacity="0.6"/>
    <circle cx="5" cy="5" r="2.5" fill="#06b6d4" opacity="0.6"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#14b8a6" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.5"/>
  </g>
  <text x="58" y="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#10b981" letter-spacing="2">ARCHITECTURE</text>
  <text x="58" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Founding plan, design rationale, and falsifiability gates</text>
  <circle cx="1170" cy="30" r="4" fill="#10b981" opacity="0.4"/>
  <circle cx="1155" cy="30" r="3" fill="#14b8a6" opacity="0.3"/>
  <circle cx="1143" cy="30" r="2" fill="#06b6d4" opacity="0.2"/>
</svg>
