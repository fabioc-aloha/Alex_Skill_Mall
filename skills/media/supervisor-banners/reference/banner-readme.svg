<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Alex ACT Supervisor — Fleet Governance and Brain Curation">
  <title>Alex ACT Supervisor</title>
  <desc>Fleet governance, brain curation, and Skill Mall maintenance for the ACT-Edition fleet</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#14b8a6" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/><line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Corner accents (emerald-teal) -->
  <path d="M0,16 Q0,0 16,0 L80,0" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M0,16 L0,80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M1120,0 L1184,0 Q1200,0 1200,16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M1200,16 L1200,80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M0,304 Q0,320 16,320 L80,320" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M0,240 L0,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M1120,320 L1184,320 Q1200,320 1200,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M1200,240 L1200,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Supervisor icon: radar/eye — fleet oversight and curation -->
  <g transform="translate(120, 160)" filter="url(#glow)">
    <!-- Outer radar ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
    <!-- Middle radar ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.25"/>
    <!-- Inner radar ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
    <!-- Radar sweep arm -->
    <line x1="0" y1="0" x2="42" y2="-42" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="-62" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Cross hairs -->
    <line x1="-62" y1="0" x2="62" y2="0" stroke="#94a3b8" stroke-width="0.6" opacity="0.15"/>
    <line x1="0" y1="-62" x2="0" y2="62" stroke="#94a3b8" stroke-width="0.6" opacity="0.15"/>
    <!-- Fleet dots (heirs on the radar) -->
    <circle cx="30" cy="-20" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="-15" cy="-35" r="3.5" fill="#14b8a6" opacity="0.7"/>
    <circle cx="20" cy="25" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="-35" cy="10" r="3.5" fill="#10b981" opacity="0.65"/>
    <circle cx="10" cy="-50" r="2.5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="-25" cy="-15" r="2.5" fill="#06b6d4" opacity="0.55"/>
    <circle cx="40" cy="5" r="2" fill="#14b8a6" opacity="0.45"/>
    <circle cx="-10" cy="40" r="2" fill="#10b981" opacity="0.4"/>
    <!-- Center pulse -->
    <circle cx="0" cy="0" r="6" fill="url(#accent)" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.4"/>
    <!-- Eye symbol at center (oversight) -->
    <path d="M-8,0 Q0,-6 8,0 Q0,6 -8,0 Z" fill="none" stroke="#f8fafc" stroke-width="1.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="2.5" fill="#f8fafc" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="230" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#f8fafc" letter-spacing="-1">Alex ACT Supervisor</text>

  <!-- Tagline -->
  <text x="230" y="143" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Fleet governance, brain curation, and Skill Mall maintenance</text>

  <!-- Accent line (emerald-teal gradient) -->
  <rect x="230" y="158" width="140" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Stats badges -->
  <g transform="translate(230, 180)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="18" r="6" fill="#10b981" opacity="0.8"/>
    <text x="34" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">28 instructions</text>

    <rect x="154" y="0" width="108" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="174" cy="18" r="6" fill="#14b8a6" opacity="0.8"/>
    <text x="188" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">45 skills</text>

    <rect x="276" y="0" width="118" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="296" cy="18" r="6" fill="#06b6d4" opacity="0.8"/>
    <text x="310" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">21 prompts</text>
  </g>

  <!-- Bottom tagline -->
  <text x="230" y="258" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#64748b">Source of truth for the ACT-Edition fleet — curate the brain, maintain the mall, govern the heirs</text>

  <!-- Right side: value proposition cards -->
  <g transform="translate(790, 35)">
    <rect x="0" y="0" width="270" height="38" rx="8" fill="#10b981" opacity="0.15"/>
    <rect x="0" y="0" width="270" height="38" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <text x="16" y="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7">Fleet registry and heir tracking</text>

    <rect x="20" y="50" width="280" height="38" rx="8" fill="#14b8a6" opacity="0.15"/>
    <rect x="20" y="50" width="280" height="38" rx="8" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <text x="36" y="74" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5eead4">Brain-QA and release ritual</text>

    <rect x="10" y="100" width="260" height="38" rx="8" fill="#06b6d4" opacity="0.12"/>
    <rect x="10" y="100" width="260" height="38" rx="8" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.35"/>
    <text x="26" y="124" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#67e8f9">Skill Mall curation and pruning</text>

    <rect x="30" y="150" width="250" height="38" rx="8" fill="#fbbf24" opacity="0.15"/>
    <rect x="30" y="150" width="250" height="38" rx="8" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
    <text x="46" y="174" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fcd34d">Cross-repo coherence checks</text>

    <rect x="15" y="200" width="260" height="38" rx="8" fill="#ef4444" opacity="0.12"/>
    <rect x="15" y="200" width="260" height="38" rx="8" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.35"/>
    <text x="31" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fca5a5">Critical thinking applied to itself</text>
  </g>

  <!-- Version pill -->
  <rect x="1070" y="280" width="100" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1120" y="296" font-family="Consolas, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">v1.0.0</text>
</svg>
